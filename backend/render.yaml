services:
  - type: web
    name: betting-api
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: betting-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: betting-db
    databaseName: betting
    user: betting_user
    plan: free